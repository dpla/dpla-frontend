name: DPLA Ingest Update

on:
  schedule:
    - cron: '0 13 * * *'  # 8 AM EST / 9 AM EDT daily
  workflow_dispatch:        # allows manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run ingest update
        env:
          DPLA_API_KEY:        ${{ secrets.DPLA_API_KEY }}
          DPLA_WP_USER:        ${{ secrets.DPLA_WP_USER }}
          DPLA_WP_APP_PASSWORD: ${{ secrets.DPLA_WP_APP_PASSWORD }}
          DPLA_SLACK_WEBHOOK:  ${{ secrets.DPLA_SLACK_WEBHOOK }}
        run: python scripts/dpla_ingest_update.py

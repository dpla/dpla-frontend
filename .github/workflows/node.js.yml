name: Node.js CI

permissions:
  contents: read

on:
  pull_request:
    branches: [ main ]

jobs:
  check-favicons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
      - name: Verify favicon assets exist for all local sites
        run: node scripts/check-favicons.js

  check-csp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
      - name: Verify all external URLs are covered by the CSP
        run: node scripts/check-csp.js

  build:
    strategy:
      matrix:
        site_env: ["user", "pro", "local"]

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Run build for ${{ matrix.site_env }}

        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_SITE_ENV: ${{ matrix.site_env }}
          NEXT_PUBLIC_LOCAL_ID: aviation
          NEXT_PUBLIC_WORDPRESS_URL: "https://dpla.wpengine.com"
          NEXT_PUBLIC_PRO_BASE_URL: "https://pro.dp.la"
          NEXT_PUBLIC_USER_BASE_URL: "https://dp.la"
          API_URL: "https://api.dp.la/v2"
        run: |
          yarn clean
          yarn install --frozen-lockfile    
          yarn build
        shell: bash

name: Generate Hub Sitemaps

on:
  schedule:
    - cron: '0 6 5 * *'  # 5th of each month at 06:00 UTC
  workflow_dispatch:
    inputs:
      hub:
        description: 'Hub to generate (leave blank for all hubs)'
        required: false
        default: ''

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install boto3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::283408157088:role/github-actions-hub-sitemaps
          role-duration-seconds: 10800
          aws-region: us-east-1

      - name: Generate hub sitemaps
        env:
          API_KEY: ${{ secrets.DPLA_API_KEY }}
          API_URL: https://api.dp.la
        run: |
          HUB="${{ github.event.inputs.hub }}"
          if [ -n "$HUB" ]; then
            python scripts/generate-hub-sitemaps.py --hub "$HUB"
          else
            python scripts/generate-hub-sitemaps.py
          fi
